name: Update Wallet Data

on:
  schedule:
    - cron: '0 1 * * *'  # daily at 01:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-wallet-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch wallet data
        run: node scripts/fetch-wallet-data.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/_data/wallet.json
          git diff --staged --quiet && echo "No changes to wallet data." || (
            git commit -m "chore: update wallet data $(date -u +%Y-%m-%d)" &&
            git push
          )
