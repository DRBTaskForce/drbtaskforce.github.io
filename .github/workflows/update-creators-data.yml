name: Update Creators Data

on:
  schedule:
    - cron: '0 14 * * *'  # daily at 08:00 CST (14:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-creators-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch creators data
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
        run: node scripts/fetch-creators-data.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/_data/creators.json
          git diff --staged --quiet && echo "No changes to creators data." || (
            git commit -m "chore: update creators data $(date -u +%Y-%m-%d)" &&
            git push
          )
