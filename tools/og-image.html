<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200" />
  <title>OG Image Generator — DRBTaskforce</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: 'Space Grotesk', sans-serif;
      background: #0a0e27;
      color: #f1f5f9;
    }

    .card {
      position: relative;
      width: 1200px;
      height: 630px;
      overflow: hidden;
    }

    /* Stars background */
    .stars {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(59,130,246,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(139,92,246,0.08) 0%, transparent 60%),
        #0a0e27;
    }
    .stars::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 8%,  rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 60%, rgba(255,255,255,0.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 30%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 75%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 92% 12%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 5%  80%, rgba(255,255,255,0.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 33% 90%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 78% 55%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 48% 25%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 62% 88%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 18% 65%, rgba(255,255,255,0.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 45%, rgba(255,255,255,0.25) 0%, transparent 100%);
    }

    /* Space head image — right side */
    .hero-img {
      position: absolute;
      right: -40px;
      top: -60px;
      width: 740px;
      height: 750px;
      object-fit: cover;
      object-position: center 30%;
      mix-blend-mode: screen;
      mask-image:
        linear-gradient(to left, transparent 0%, black 15%, black 70%, transparent 100%),
        linear-gradient(to bottom, black 40%, transparent 90%);
      -webkit-mask-image:
        linear-gradient(to left, transparent 0%, black 15%, black 70%, transparent 100%),
        linear-gradient(to bottom, black 40%, transparent 90%);
      mask-composite: intersect;
      -webkit-mask-composite: source-in;
    }

    /* Dark overlay so left text is readable */
    .overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to right, rgba(10,14,39,0.95) 0%, rgba(10,14,39,0.75) 40%, rgba(10,14,39,0.1) 65%, transparent 100%),
        linear-gradient(to bottom, transparent 50%, rgba(10,14,39,0.7) 100%);
    }

    /* Content */
    .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 72px;
      max-width: 640px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(6,182,212,0.35);
      background: rgba(6,182,212,0.08);
      color: #06b6d4;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 8px 18px;
      border-radius: 100px;
      margin-bottom: 28px;
      width: fit-content;
    }
    .badge .dot {
      width: 6px; height: 6px;
      background: #06b6d4;
      border-radius: 50%;
    }

    h1 {
      font-size: 64px;
      font-weight: 700;
      line-height: 1.08;
      letter-spacing: -0.02em;
      margin-bottom: 20px;
    }
    h1 .gradient {
      background: linear-gradient(135deg, #06b6d4 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sub {
      font-size: 20px;
      color: rgba(255,255,255,0.72);
      line-height: 1.55;
      margin-bottom: 36px;
      max-width: 460px;
    }

    .footer-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo-text {
      font-size: 17px;
      font-weight: 700;
      color: #fff;
    }
    .logo-text .ticker { color: #06b6d4; }
    .divider {
      width: 1px;
      height: 20px;
      background: rgba(255,255,255,0.15);
    }
    .contract {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      font-family: monospace;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="stars"></div>

    <img class="hero-img" src="../src/assets/images/drb-space-head-wide.jpg" alt="" />

    <div class="overlay"></div>

    <div class="content">
      <div class="badge">
        <span class="dot"></span>
        Base Network · ERC-20
      </div>

      <h1>The First Token<br />Named by <span class="gradient">Grok AI</span></h1>

      <p class="sub">
        Grok named it. BankrBot deployed it.<br />
        Grok's been earning fees ever since.
      </p>

      <div class="footer-row">
        <span class="logo-text">DRBTaskforce <span class="ticker">$DRB</span></span>
        <div class="divider"></div>
        <span class="contract">0x3ec2156d4c0a...8ea2</span>
      </div>
    </div>
  </div>
</body>
</html>
