<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found · DRBTaskforce</title>
  <meta name="description" content="This page doesn't exist. Head back to the DRBTaskforce community hub." />
  <meta name="robots" content="noindex" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/assets/images/logo.png" />
  <link rel="apple-touch-icon" href="/assets/images/logo.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:    #3b82f6;
      --blue-glow: rgba(59, 130, 246, 0.35);
      --purple:  #8b5cf6;
      --cyan:    #22d3ee;
      --bg:      #020917;
      --surface: rgba(255,255,255,0.04);
      --border:  rgba(255,255,255,0.08);
      --text:    #e2e8f0;
      --muted:   #64748b;
      --radius:  12px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Stars */
    .stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(59,130,246,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(139,92,246,0.08) 0%, transparent 60%),
        var(--bg);
      pointer-events: none;
    }
    .stars::before, .stars::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 8%,  rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 30%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 75%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 92% 12%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 5%  80%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 33% 90%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 78% 55%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 48% 25%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 62% 88%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 18% 65%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 45%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 3%  35%, rgba(255,255,255,0.5) 0%, transparent 100%);
    }
    .stars::after {
      transform: rotate(45deg) scale(1.5);
      opacity: 0.4;
    }

    /* Layout */
    .wrap { position: relative; z-index: 1; display: flex; flex-direction: column; flex: 1; }
    .container { max-width: 960px; margin: 0 auto; padding: 0 24px; }

    /* Nav */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border);
      background: rgba(2, 9, 23, 0.85);
      backdrop-filter: blur(12px);
    }
    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }
    .nav-logo {
      font-weight: 700;
      font-size: 1rem;
      color: #fff;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-logo .ticker { color: var(--cyan); }
    .nav-links {
      display: flex;
      gap: 24px;
      list-style: none;
    }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: #fff; }

    /* ── Hamburger ── */
    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
    }
    .hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--text);
      border-radius: 2px;
      transition: transform 0.25s, opacity 0.25s;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    @media (max-width: 640px) {
      .hamburger { display: flex; }
      .nav-links {
        display: none;
        position: absolute;
        top: 60px;
        left: 0;
        right: 0;
        background: rgba(2, 9, 23, 0.97);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
        flex-direction: column;
        padding: 16px 24px;
        gap: 16px;
        z-index: 99;
      }
      .nav-links.open { display: flex; }
      .nav-links a { font-size: 0.9rem; }
    }

    /* 404 content */
    .not-found {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 24px;
    }
    .not-found-inner { max-width: 480px; }

    .logo-mark {
      width: 96px;
      height: 96px;
      margin: 0 auto 32px;
      opacity: 0.85;
    }
    .logo-mark img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .error-code {
      font-size: 6rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      background: linear-gradient(135deg, var(--blue) 0%, var(--cyan) 50%, var(--purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }

    .not-found h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .not-found p {
      color: var(--muted);
      line-height: 1.7;
      font-size: 0.95rem;
      margin-bottom: 36px;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .btn-primary {
      background: var(--blue);
      color: #fff;
      box-shadow: 0 0 24px var(--blue-glow);
    }
    .btn-primary:hover {
      background: #2563eb;
      box-shadow: 0 0 36px var(--blue-glow);
      transform: translateY(-1px);
    }
    .btn-ghost {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover {
      background: rgba(255,255,255,0.08);
      transform: translateY(-1px);
    }

    /* Footer */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 0;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    footer p {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.6;
    }
    footer a { color: var(--cyan); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="wrap">

    <!-- Nav -->
    <nav>
      <div class="container">
        <div class="nav-inner">
          <a href="/" class="nav-logo">
            <span>DRBTaskforce</span>
            <span class="ticker">$DRB</span>
          </a>
          <ul class="nav-links" id="nav-links">
            <li><a href="/#origin">Origin</a></li>
            <li><a href="/token/">Token</a></li>
            <li><a href="/#community">Community</a></li>
            <li><a href="https://x.com/DRBTaskForce" target="_blank">X</a></li>
          </ul>
          <button class="hamburger" id="hamburger" aria-label="Toggle menu" onclick="toggleNav()">
            <span></span><span></span><span></span>
          </button>
        </div>
      </div>
    </nav>

    <!-- 404 -->
    <section class="not-found">
      <div class="not-found-inner">
        <div class="logo-mark">
          <img src="/assets/images/logo.png" alt="$DRB Task Force" />
        </div>
        <div class="error-code">404</div>
        <h1>Lost in the cosmos</h1>
        <p>
          This page doesn't exist — or maybe it was never deployed.<br />
          The task force is still out there though.
        </p>
        <div class="actions">
          <a href="/" class="btn btn-primary">Back to Home</a>
          <a href="/token/" class="btn btn-ghost">Token Info</a>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer>
      <div class="container">
        <p>
          <strong>DRBTaskforce</strong> — community hub for <a href="https://basescan.org/token/0x3ec2156d4c0a9cbdab4a016633b7bcf6a8d68ea2" target="_blank" rel="noopener">$DRB</a> on Base.
          Not affiliated with xAI or Grok.
        </p>
      </div>
    </footer>

  </div>
  <script>
    function toggleNav() {
      document.getElementById('nav-links').classList.toggle('open');
      document.getElementById('hamburger').classList.toggle('open');
    }
    document.querySelectorAll('.nav-links a').forEach(function(a) {
      a.addEventListener('click', function() {
        document.getElementById('nav-links').classList.remove('open');
        document.getElementById('hamburger').classList.remove('open');
      });
    });
  </script>
</body>
</html>
